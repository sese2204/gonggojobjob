spring:
  application:
    name: kotlin-ai-test

  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:

  sql:
    init:
      mode: never

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret
            scope: email, profile

jwt:
  secret: test-secret-key-must-be-at-least-256-bits-long-for-hmac-sha256-algorithm
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

oauth2:
  redirect-uri: http://localhost:5173/oauth/callback

gemini:
  api:
    key: test-key
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent
    timeout-seconds: 30
  embedding:
    model: gemini-embedding-001
    dimensions: 768
    batch-size: 10

rag:
  search:
    top-n: 20
    keyword-weight: 0.5
    vector-weight: 0.5

cors:
  allowed-origins: http://localhost:5173

wanted:
  api:
    url: https://www.wanted.co.kr/api/v4/jobs
    timeout-seconds: 30
    country: kr
    job-sort: job.latest_order
    years: "0,1"
    locations: all
    limit: 20
    max-pages-per-category: 5
    page-delay-ms: 500
    tag-type-ids: "518,523"

goyong24:
  api:
    key: test-key
    url: https://www.work24.go.kr/cm/openApi/call/wk/callOpenApiSvcInfo210L21.do
    timeout-seconds: 30

allcon:
  api:
    url: https://www.all-con.co.kr/page/ajax.contest_list.php
    max-pages: 2
    page-delay-ms: 0
    page-size: 15

wevity:
  api:
    base-url: https://www.wevity.com
    max-pages: 2
    page-delay-ms: 0

thinkcontest:
  api:
    url: https://www.thinkcontest.com/thinkgood/user
    records-per-page: 10
    max-pages: 2
    page-delay-ms: 0
