spring:
  application:
    name: kotlin-ai

  datasource:
    url: ${DB_URL:jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}

  sql:
    init:
      mode: ${SQL_INIT_MODE:never}

  h2:
    console:
      enabled: false

  jpa:
    database-platform: ${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:create-drop}
    show-sql: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

server:
  port: 8080
gemini:
  api:
    key: ${GEMINI_API_KEY:}
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent
    timeout-seconds: 30

  embedding:
    model: gemini-embedding-001
    dimensions: 768
    batch-size: 10

rag:
  search:
    top-n: 20
    keyword-weight: 0.5
    vector-weight: 0.5

goyong24:
  api:
    key: ${GOYONG24_API_KEY:}
    url: https://www.work24.go.kr/cm/openApi/call/wk/callOpenApiSvcInfo210L21.do
    timeout-seconds: 30
