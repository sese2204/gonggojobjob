spring:
  application:
    name: kotlin-ai

  datasource:
    url: ${DB_URL:jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}

  sql:
    init:
      mode: ${SQL_INIT_MODE:never}

  h2:
    console:
      enabled: false

  jpa:
    database-platform: ${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:create-drop}
    show-sql: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: email, profile

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

server:
  port: ${PORT:8080}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://job-jub.com,https://www.job-jub.com,http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:1800000}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

oauth2:
  redirect-uri: ${OAUTH2_REDIRECT_URI:https://job-jub.com/oauth/callback}

gemini:
  api:
    key: ${GEMINI_API_KEY:}
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent
    timeout-seconds: 30

  embedding:
    model: gemini-embedding-001
    dimensions: 768
    batch-size: 10

rag:
  search:
    top-n: 20
    keyword-weight: 0.5
    vector-weight: 0.5

goyong24:
  api:
    key: ${GOYONG24_API_KEY:}
    url: https://www.work24.go.kr/cm/openApi/call/wk/callOpenApiSvcInfo210L21.do
    timeout-seconds: 30
